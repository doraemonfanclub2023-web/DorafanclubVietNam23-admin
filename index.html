<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dora Fanclub Việt Nam</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#0099ff,
#0055aa
);

}

.login-box{

width:420px;

background:white;

border-radius:20px;

padding:40px;

box-shadow:
0 10px 40px rgba(0,0,0,.25);

}

.logo{

text-align:center;

margin-bottom:25px;

}

.logo img{

width:260px;

max-width:100%;

margin-bottom:10px;

}

.logo h2{

color:#0099ff;

font-size:22px;

}

.logo p{

color:#777;

margin-top:5px;

font-size:14px;

}

.form-group{

margin-bottom:18px;

}

.form-group label{

display:block;

margin-bottom:8px;

font-weight:600;

}

.form-group input{

width:100%;

padding:12px;

border:1px solid #ccc;

border-radius:10px;

font-size:15px;

}

.form-group input:focus{

outline:none;

border-color:#0099ff;

}

button{

width:100%;

padding:13px;

border:none;

border-radius:10px;

background:#0099ff;

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#0077dd;

}

.error{

display:none;

margin-top:15px;

text-align:center;

color:red;

font-weight:600;

}

.footer{

margin-top:20px;

text-align:center;

font-size:12px;

color:#666;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<img src="assets/logo.png">

<h2>HỆ THỐNG QUẢN LÝ NỘI BỘ</h2>

<p>Dora Fanclub Việt Nam</p>

</div>

<form id="loginForm">

<div class="form-group">

<label>Tài khoản</label>

<input
type="text"
id="username"
required>

</div>

<div class="form-group">

<label>Mật khẩu</label>

<input
type="password"
id="password"
required>

</div>

<button type="submit">

Đăng nhập

</button>

<div
class="error"
id="error">

Sai tài khoản hoặc mật khẩu

</div>

</form>

<div class="footer">

© Dora Fanclub Việt Nam 2026

</div>

</div>

<script>

const USERS = [

{
username:"BQT001",
password:"dora2026",
role:"BQT",
name:"Nguyễn Thị Thảo Nhi"
},

{
username:"ADM001",
password:"admin2026",
role:"ADMIN",
name:"Khánh Duy"
}

];

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();

const user =
document.getElementById("username").value;

const pass =
document.getElementById("password").value;

const account =
USERS.find(

x =>

x.username === user &&
x.password === pass

);

if(account){

localStorage.setItem(
"currentUser",
JSON.stringify(account)
);

window.location.href =
"dashboard.html";

}else{

document
.getElementById("error")
.style.display = "block";

}

});

</script>

</body>
</html>
