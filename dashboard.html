<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dora Fanclub Việt Nam - Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
height:100vh;
background:#f4f8fb;
}

/* Sidebar */

.sidebar{
width:260px;
background:#0099ff;
color:white;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:180px;
max-width:100%;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu button{
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,.15);
color:white;
font-size:15px;
cursor:pointer;
text-align:left;
}

.menu button:hover{
background:rgba(255,255,255,.25);
}

/* Main */

.main{
flex:1;
padding:30px;
overflow:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.userbox{
background:white;
padding:10px 15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 15px rgba(0,0,0,.08);
}

.card h3{
font-size:15px;
color:#666;
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
color:#0099ff;
}

.content{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 3px 15px rgba(0,0,0,.08);
}

.content h2{
margin-bottom:15px;
}

.logout{
margin-top:auto;
background:#ff4444!important;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="assets/logo.png">
</div>

<div class="menu">

<button onclick="showPage('home')">
🏠 Trang chủ
</button>

<button onclick="showPage('members')">
👥 Thành viên
</button>

<button id="bqtMenu" onclick="showPage('admins')">
🛡️ Ban quản trị
</button>

<button onclick="showPage('notice')">
📢 Thông báo
</button>

<button onclick="showPage('game')">
🎁 Mini Game
</button>

<button onclick="showPage('violation')">
⚠️ Vi phạm
</button>

<button id="logMenu" onclick="showPage('log')">
📋 Nhật ký hoạt động
</button>

<button class="logout" onclick="logout()">
🚪 Đăng xuất
</button>

</div>

</div>

<div class="main">

<div class="header">

<h1>DORA FANCLUB VIỆT NAM</h1>

<div class="userbox">
<span id="welcome"></span>
</div>

</div>

<div class="cards">

<div class="card">
<h3>Tổng thành viên</h3>
<p>152</p>
</div>

<div class="card">
<h3>BQT</h3>
<p>2</p>
</div>

<div class="card">
<h3>Admin</h3>
<p>5</p>
</div>

<div class="card">
<h3>Mini Game</h3>
<p>1</p>
</div>

</div>

<div class="content" id="content">

<h2>🏠 Trang chủ</h2>

<p>
Chào mừng đến với Hệ thống quản lý nội bộ Dora Fanclub Việt Nam.
</p>

</div>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("currentUser")
);

if(!user){
window.location.href="index.html";
}

document.getElementById("welcome").innerHTML=
user.name + " (" + user.role + ")";

if(user.role !== "BQT"){
document.getElementById("bqtMenu").style.display="none";
document.getElementById("logMenu").style.display="none";
}

function showPage(page){

let content=
document.getElementById("content");

switch(page){

case "home":

content.innerHTML=`
<h2>🏠 Trang chủ</h2>
<p>Chào mừng đến với hệ thống quản lý nội bộ Dora Fanclub Việt Nam.</p>
`;

break;

case "members":

content.innerHTML=`
<h2>👥 Thành viên</h2>

<table border="1" width="100%" cellpadding="10">

<tr>
<th>Mã</th>
<th>Họ tên</th>
<th>Chức vụ</th>
</tr>

<tr>
<td>TV001</td>
<td>Cao Ngọc Duyên</td>
<td>Thành viên</td>
</tr>

<tr>
<td>TV002</td>
<td>Nguyễn Thị Thảo Nhi</td>
<td>BQT</td>
</tr>

</table>
`;

break;

case "admins":

content.innerHTML=`
<h2>🛡️ Ban quản trị</h2>

<ul>
<li>Nguyễn Thị Thảo Nhi - BQT</li>
<li>Khánh Duy - Admin</li>
</ul>
`;

break;

case "notice":

content.innerHTML=`
<h2>📢 Thông báo</h2>

<p>Chưa có thông báo mới.</p>
`;

break;

case "game":

content.innerHTML=`
<h2>🎁 Mini Game</h2>

<p>Hè rực rỡ - Săn bảo bối khủng.</p>
`;

break;

case "violation":

content.innerHTML=`
<h2>⚠️ Vi phạm</h2>

<p>Chưa có biên bản vi phạm.</p>
`;

break;

case "log":

content.innerHTML=`
<h2>📋 Nhật ký hoạt động</h2>

<ul>
<li>02/07/2026 - Đăng nhập hệ thống</li>
<li>01/07/2026 - Cập nhật thành viên</li>
</ul>
`;

break;

}

}

function logout(){

localStorage.removeItem(
"currentUser"
);

window.location.href=
"index.html";

}

</script>
<script src="js/members.js"></script>
</body>
</html>
