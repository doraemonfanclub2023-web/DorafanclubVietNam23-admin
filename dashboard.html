<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dora Fanclub Việt Nam - Quản trị</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#0099ff;
color:white;
padding:20px;
}

header h1{
font-size:28px;
}

nav{
background:white;
padding:15px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

nav button{
padding:10px 15px;
margin-right:10px;
border:none;
background:#0099ff;
color:white;
border-radius:6px;
cursor:pointer;
}

nav button:hover{
background:#0077cc;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
}

table th,
table td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

table th{
background:#0099ff;
color:white;
}

input{
padding:10px;
width:300px;
margin-right:10px;
}

.action-btn{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.delete-btn{
background:red;
color:white;
}

.logout{
background:#e60000;
color:white;
margin-top:20px;
}
</style>

</head>
<body>

<header>
<h1>Dora Fanclub Việt Nam</h1>
</header>

<nav>
<button onclick="showHome()">🏠 Trang chủ</button>
<button onclick="showMembers()">👥 Thành viên</button>
<button onclick="showPosts()">📢 Bài đăng</button>
<button onclick="showMiniGame()">🎁 Mini Game</button>
</nav>

<div class="container">

<div id="content"></div>

<button class="action-btn logout" onclick="logout()">
Đăng xuất
</button>

</div>

<script>

if(!localStorage.getItem("members")){

localStorage.setItem(
"members",
JSON.stringify([
{
id:"TV001",
name:"Nguyễn Thị Thảo Nhi",
role:"BQT"
},
{
id:"TV002",
name:"Khánh Duy",
role:"ADMIN"
}
])
);

}

showHome();

function showHome(){

document.getElementById("content").innerHTML=`

<div class="card">
<h2>👋 Xin chào Admin</h2>
<br>
<p>Chào mừng đến hệ thống quản lý Dora Fanclub Việt Nam.</p>
</div>

<div class="card">
<h2>📊 Thống kê</h2>
<br>
<p>Số thành viên quản trị:
${getMembers().length}</p>
</div>

`;

}

function getMembers(){
return JSON.parse(
localStorage.getItem("members")
);
}

function saveMembers(data){
localStorage.setItem(
"members",
JSON.stringify(data)
);
}

function showMembers(){

let html=`

<div class="card">

<h2>👥 Quản lý thành viên</h2>

<br>

<input
id="searchBox"
placeholder="Tìm thành viên..."
onkeyup="searchMembers()">

<button onclick="addMember()">
➕ Thêm thành viên
</button>

<br><br>

<div id="memberTable"></div>

</div>

`;

document.getElementById("content").innerHTML=html;

renderTable(getMembers());

}

function renderTable(data){

let html=`

<table>

<tr>
<th>Mã</th>
<th>Họ tên</th>
<th>Vai trò</th>
<th>Thao tác</th>
</tr>

`;

data.forEach((m,index)=>{

html+=`

<tr>

<td>${m.id}</td>
<td>${m.name}</td>
<td>${m.role}</td>

<td>
<button
class="action-btn delete-btn"
onclick="deleteMember(${index})">
Xóa
</button>
</td>

</tr>

`;

});

html+=`</table>`;

document.getElementById(
"memberTable"
).innerHTML=html;

}

function searchMembers(){

const keyword=
document.getElementById("searchBox")
.value
.toLowerCase();

const result=
getMembers().filter(

m =>
m.name.toLowerCase()
.includes(keyword)

);

renderTable(result);

}

function addMember(){

const name=
prompt("Nhập họ tên:");

if(!name) return;

const role=
prompt("Nhập vai trò (BQT hoặc ADMIN):");

const members=
getMembers();

members.push({

id:
"TV"+
String(
members.length+1
).padStart(3,"0"),

name:name,

role:role || "ADMIN"

});

saveMembers(members);

showMembers();

}

function deleteMember(index){

if(!confirm("Xóa thành viên này?"))
return;

const members=
getMembers();

members.splice(index,1);

saveMembers(members);

showMembers();

}

function showPosts(){

document.getElementById("content").innerHTML=`

<div class="card">
<h2>📢 Quản lý bài đăng</h2>
<br>
<p>Tính năng đang phát triển.</p>
</div>

`;

}

function showMiniGame(){

document.getElementById("content").innerHTML=`

<div class="card">
<h2>🎁 Mini Game</h2>
<br>
<p>Tính năng đang phát triển.</p>
</div>

`;

}

function logout(){

localStorage.removeItem(
"currentUser"
);

window.location.href=
"index.html";

}

</script>

</body>
</html>
