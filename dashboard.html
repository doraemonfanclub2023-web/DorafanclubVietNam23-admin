<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Doraemon Fanclub</title>
    <!-- Ô nhập tài khoản mới -->
<input type="text" id="newUsername" placeholder="Tên đăng nhập (ví dụ: ADMIN001)..." autocomplete="off">

<!-- Ô nhập mật khẩu mới -->
<input type="password" id="newPassword" placeholder="Mật khẩu..." autocomplete="new-password">
    <!-- Thẻ này phải viết chuẩn như thế này -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <h2>DORAEMON FANCLUB ADMIN</h2>
        <div class="user-box">
            Xin chào, <span id="userName">BQT001</span>
        </div>
    </header>

    <div class="container">
        <!-- SIDEBAR TRÁI -->
        <aside class="sidebar">
            <ul>
                <li><a href="#" onclick="showPage('home')">Trang chủ</a></li>
                <li><a href="#" onclick="showPage('members')">Quản lý thành viên</a></li>
                <li><a href="#" onclick="showPage('game')">Quản lý Mini Game</a></li>
                <li><a href="#" onclick="showPage('notice')">Quản lý thông báo</a></li>
                <li><a href="#" onclick="showPage('setting')">Cài đặt hệ thống</a></li>
                <li><a href="javascript:void(0);" class="logout" onclick="logout()">Đăng xuất</a></li>
            </ul>
        </aside>

        <!-- NỘI DUNG CHÍNH (ĐỔ DỮ LIỆU ĐỘNG QUA SPA) -->
        <main class="content">
            <div id="pageContent"></div>
        </main>
    </div>

    <!-- Liên kết tới file xử lý logic JavaScript -->
    <script src="script.js"></script>
</body>
</html>
